<!DOCTYPE html>
<html>
<body>

<div class="button">
<button id="open">Open</button>
<button id="close">Close</button>
</div>
<p><span id="temperC"></span> C<br><span id="temperF"></span> F</p>

<div>
<label><input type="checkbox" id="tempControlCheckbox" />
Automatic Temperature Control</label>
</div>

<div class="slider">
<label for="desiredTemp">Desired Temperature:</label>
<input id="desiredTemp" type="range" min="0" max="50" step="0.1" value="25" />
<span id="desiredTempC"> C</span> / <span id="desiredTempF"> F</span>
</div>


<script>

document.getElementById("open").addEventListener("click", function(event)
{
event.preventDefault();

const buttons = document.querySelectorAll(".button");
buttons.forEach(button => button.style.display = "none");

fetch("/pin17", { method: "POST" })

.finally(() => {
buttons.forEach(button => button.style.display = "block");
});
});

document.getElementById("close").addEventListener("click", function(event)
{
event.preventDefault();

const buttons = document.querySelectorAll(".button");
buttons.forEach(button => button.style.display = "none");

fetch("/pin27", { method: "POST" })

.finally(() => {
buttons.forEach(button => button.style.display = "block");
});
});

function updateTemper()
{
fetch("/temper")
.then (response => response.json())
.then (data =>
{
document.getElementById("temperC").innerText = data.temper.toFixed(2);
document.getElementById("temperF").innerText = ((data.temper * 1.8) + 32).toFixed(2);
})}

setInterval(updateTemper, 1000);
updateTemper();

</script>
</body>
</html>
