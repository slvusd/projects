<!DOCTYPE html>
<html>
<body>


<button onclick="open()">Open</button>
<button onclick="close()">Close</button>
<p>Temperature: <span id="temper"></span> C</p>


<script>

function open()
{
fetch('/pin17', { method: 'POST' });
}

function close()
{
fetch('/pin27', { method: 'POST' });
}

function updateTemper()
{
fetch('/temper')
.then (response => response.json())
.then (data => {
document.getElementById('temper').innerText = data.temper.toFixed(2);
})
}

setInterval(updateTemper, 1000);
updateTemper();

</script>
</body>
</html>
